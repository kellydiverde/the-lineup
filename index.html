<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Lineup — Future Fest 2026</title>
  <style>
    @font-face { font-family: 'NVIDIASans'; src: url('NVIDIASans_Lt.ttf'); font-weight: 300; font-style: normal; }
    @font-face { font-family: 'NVIDIASans'; src: url('NVIDIASans_LtIt.ttf'); font-weight: 300; font-style: italic; }
    @font-face { font-family: 'NVIDIASans'; src: url('NVIDIASans_Rg.ttf'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'NVIDIASans'; src: url('NVIDIASans_It.ttf'); font-weight: 400; font-style: italic; }
    @font-face { font-family: 'NVIDIASans'; src: url('NVIDIASans_Md.ttf'); font-weight: 500; font-style: normal; }
    @font-face { font-family: 'NVIDIASans'; src: url('NVIDIASans_MdIt.ttf'); font-weight: 500; font-style: italic; }
    @font-face { font-family: 'NVIDIASans'; src: url('NVIDIASans_Bd.ttf'); font-weight: 700; font-style: normal; }
    @font-face { font-family: 'NVIDIASans'; src: url('NVIDIASans_BdIt.ttf'); font-weight: 700; font-style: italic; }
  </style>
  <style>
    :root {
      --green: #76B900;
      --purple: #5D1682;
      --gold: #D6B545;
      --silver: #C8C8D4;
      --green-dim: rgba(118,185,0,0.18);
      --purple-dim: rgba(93,22,130,0.18);
      --green-border: rgba(118,185,0,0.45);
      --purple-border: rgba(93,22,130,0.5);
      --bg: #090909;
      --card: #121212;
      --white: #FFFFFF;
      --muted: rgba(255,255,255,0.45);
      --divider: rgba(255,255,255,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'NVIDIASans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 14px 40px;
    }

    .ic-gold   { color: var(--gold); }
    .ic-silver { color: var(--silver); }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 430px;
      text-align: center;
      margin-bottom: 14px;
    }

    .eyebrow {
      font-family: 'NVIDIASans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .title-the {
      font-family: 'NVIDIASans', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--silver);
      text-transform: uppercase;
      line-height: 1;
      display: block;
    }

    .title-lineup {
      font-family: 'NVIDIASans', sans-serif;
      font-size: 76px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      line-height: 0.88;
      display: block;
      background: linear-gradient(90deg, var(--green) 0%, #A8D800 55%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .rule {
      width: 130px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--silver), var(--gold), transparent);
      margin: 10px auto;
    }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }


    /* ── Progress ── */
    .progress {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 430px;
      margin-bottom: 14px;
    }

    .prog-zone {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .prog-zone.fest {
      background: var(--green-dim);
      border: 1px solid var(--green-border);
    }

    .prog-zone.future {
      background: var(--purple-dim);
      border: 1px solid var(--purple-border);
    }

    .prog-label {
      font-family: 'NVIDIASans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .prog-label.fest  { color: var(--green); }
    .prog-label.future { color: #C580FF; }

    .prog-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dots { display: flex; gap: 4px; }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 1.5px solid;
      transition: background 0.2s;
    }

    .dot.fest   { border-color: var(--green); }
    .dot.fest.filled  { background: var(--green); }
    .dot.future { border-color: #9B4DCA; }
    .dot.future.filled { background: #9B4DCA; }

    .prog-check {
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      color: var(--gold);
    }
    .prog-check.visible { opacity: 1; }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 430px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 14px;
      padding: 1.5px;
      background: linear-gradient(135deg, var(--gold), var(--silver), var(--gold), var(--silver));
    }

    .card-inner {
      background: var(--card);
      border-radius: 14.5px;
      overflow: hidden;
    }

    .zone-headers {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .zone-header {
      padding: 11px 8px;
      text-align: center;
      font-family: 'NVIDIASans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .zone-header.fest   { background: var(--green); color: #000; }
    .zone-header.future { background: var(--purple); color: #fff; }

    .zone-icon { font-size: 13px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .sq {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 5px;
      text-align: center;
      font-size: 9.5px;
      line-height: 1.35;
      font-weight: 500;
      border: 0.5px solid var(--divider);
      position: relative;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      user-select: none;
      color: rgba(255,255,255,0.65);
    }

    .sq.fest   { background: rgba(118,185,0,0.06); }
    .sq.future { background: rgba(93,22,130,0.08); }

    .sq.marked.fest {
      background: rgba(118,185,0,0.22);
      border-color: rgba(118,185,0,0.4);
      color: #fff;
    }

    .sq.marked.future {
      background: rgba(93,22,130,0.28);
      border-color: rgba(147,63,242,0.4);
      color: #fff;
    }

    .sq-check {
      position: absolute;
      top: 4px;
      right: 5px;
      font-size: 9px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.2s;
      color: var(--gold);
    }

    .sq.marked .sq-check { opacity: 1; }

    /* ── Submit ── */
    .submit-wrap {
      width: 100%;
      max-width: 430px;
    }

    .submit-btn {
      width: 100%;
      padding: 17px;
      border-radius: 12px;
      border: none;
      font-family: 'NVIDIASans', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn.locked {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.25);
      cursor: not-allowed;
    }

    .submit-btn.unlocked {
      background: linear-gradient(90deg, #C4A030, var(--gold), #E8CC6A, var(--gold), #C4A030);
      color: #000;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(214,181,69,0.4);
    }

    .submit-btn.unlocked:active { transform: scale(0.98); }

    .submit-hint {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 9px;
    }

    .reset-btn {
      display: block;
      margin: 28px auto 0;
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.25);
      font-family: 'NVIDIASans', sans-serif;
      font-size: 11px;
      padding: 6px 18px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* ── Bottom accent ── */
    .bottom-accent {
      margin-top: 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      opacity: 0.4;
      font-size: 13px;
    }

    .bottom-accent .ic-gold   { color: var(--gold); }
    .bottom-accent .ic-silver { color: var(--silver); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(255,255,255,0.95);
      color: #000;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'NVIDIASans', sans-serif;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="eyebrow">Future Fest 2026 &nbsp;·&nbsp; Intern Cohort Competition</div>
    <span class="title-the">The</span>
    <span class="title-lineup">Lineup</span>
    <div class="rule"></div>
    <div class="tagline">Scan 2 FEST + 2 FUTURE to lock in your lineup</div>
  </div>

  <div class="progress" id="progress"></div>

  <div class="card">
    <div class="card-inner">
      <div class="zone-headers">
        <div class="zone-header fest"><span class="zone-icon">♪ ♫</span>&nbsp; FEST Stage</div>
        <div class="zone-header future"><span class="zone-icon">✦ ◈</span>&nbsp; Future Stage</div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div class="submit-wrap">
    <button class="submit-btn locked" id="submitBtn" onclick="handleSubmit()">
      ✦ Lock In My Lineup ✦
    </button>
    <div class="submit-hint" id="submitHint">Scan at least 2 FEST + 2 FUTURE to unlock</div>
  </div>

  <button class="reset-btn" onclick="resetCard()">Reset card (testing only)</button>

  <div class="bottom-accent">
    <span class="ic-gold">♪</span>
    <span class="ic-silver">· · ·</span>
    <span class="ic-gold">✦</span>
    <span class="ic-silver">· · ·</span>
    <span class="ic-gold">♫</span>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const FORM_URL = 'https://forms.microsoft.com/PLACEHOLDER_REPLACE_WITH_REAL_URL';
    const STORAGE_KEY = 'lineup-2026';

    const squares = [
      { id: 'fest-1',   zone: 'fest',   icon: '♪', label: 'Grill or\npizza oven' },
      { id: 'fest-2',   zone: 'fest',   icon: '♫', label: 'FEST\nphotobooth' },
      { id: 'future-1', zone: 'future', icon: '◈', label: 'FUTURE\nbar' },
      { id: 'future-2', zone: 'future', icon: '✦', label: 'Find the\nrobot' },

      { id: 'fest-3',   zone: 'fest',   icon: '♬', label: 'FEST\nbar' },
      { id: 'fest-4',   zone: 'fest',   icon: '♪', label: 'Claw\nmachine' },
      { id: 'future-3', zone: 'future', icon: '⬡', label: 'FUTURE\nphotobooth' },
      { id: 'future-4', zone: 'future', icon: '◈', label: 'Demo\nstation' },

      { id: 'fest-5',   zone: 'fest',   icon: '♫', label: 'Festival\nGlam' },
      { id: 'fest-6',   zone: 'fest',   icon: '♬', label: 'Live\nmusic' },
      { id: 'future-5', zone: 'future', icon: '✦', label: 'Mirror\nball / DJ' },
      { id: 'future-6', zone: 'future', icon: '⬡', label: 'Main\nstage' },

      { id: 'fest-7',   zone: 'fest',   icon: '♪', label: 'Food\ntrailer' },
      { id: 'fest-8',   zone: 'fest',   icon: '♫', label: 'Voyager\ncheck-in' },
      { id: 'future-7', zone: 'future', icon: '◈', label: 'Endeavor\ncheck-in' },
      { id: 'future-8', zone: 'future', icon: '✦', label: 'TBD' },
    ];

    function getMarked() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch { return []; }
    }

    function saveMarked(ids) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
    }

    function markSquare(id) {
      const marked = getMarked();
      if (marked.includes(id)) return false;
      marked.push(id);
      saveMarked(marked);
      return true;
    }

    function render() {
      const marked = getMarked();
      const festCount   = marked.filter(id => id.startsWith('fest')).length;
      const futureCount = marked.filter(id => id.startsWith('future')).length;

      document.getElementById('progress').innerHTML = `
        <div class="prog-zone fest">
          <span class="prog-label fest"><span>♪</span> FEST</span>
          <div class="prog-right">
            <div class="dots">
              ${[0,1,2,3].map(i => `<div class="dot fest ${i < festCount ? 'filled' : ''}"></div>`).join('')}
            </div>
            <span class="prog-check ${festCount >= 2 ? 'visible' : ''}">✓</span>
          </div>
        </div>
        <div class="prog-zone future">
          <span class="prog-label future"><span>✦</span> FUTURE</span>
          <div class="prog-right">
            <div class="dots">
              ${[0,1,2,3].map(i => `<div class="dot future ${i < futureCount ? 'filled' : ''}"></div>`).join('')}
            </div>
            <span class="prog-check ${futureCount >= 2 ? 'visible' : ''}">✓</span>
          </div>
        </div>
      `;

      document.getElementById('grid').innerHTML = squares.map(sq => `
        <div class="sq ${sq.zone} ${marked.includes(sq.id) ? 'marked' : ''}" onclick="tapSquare('${sq.id}')">
          <span class="sq-check">✓</span>
          ${sq.label.replace('\n', '<br>')}
        </div>
      `).join('');

      const unlocked = festCount >= 2 && futureCount >= 2;
      const btn  = document.getElementById('submitBtn');
      const hint = document.getElementById('submitHint');
      btn.className = 'submit-btn ' + (unlocked ? 'unlocked' : 'locked');
      hint.textContent = unlocked
        ? 'Your lineup is locked — tap to submit for your cohort!'
        : `Need: ${Math.max(0, 2 - festCount)} more FEST · ${Math.max(0, 2 - futureCount)} more FUTURE`;
    }

    function tapSquare(id) {
      const isNew = markSquare(id);
      showToast(isNew ? 'Added to your lineup!' : 'Already in your lineup');
      render();
    }

    function handleSubmit() {
      const marked = getMarked();
      const fest   = marked.filter(id => id.startsWith('fest')).length;
      const future = marked.filter(id => id.startsWith('future')).length;
      if (fest >= 2 && future >= 2) window.location.href = FORM_URL;
    }

    function resetCard() {
      localStorage.removeItem(STORAGE_KEY);
      render();
      showToast('Card reset');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    (function handleQRParam() {
      const params = new URLSearchParams(window.location.search);
      const mark = params.get('mark');
      if (mark && squares.find(sq => sq.id === mark)) {
        const isNew = markSquare(mark);
        history.replaceState({}, '', window.location.pathname);
        setTimeout(() => showToast(isNew ? 'Added to your lineup!' : 'Already in your lineup'), 100);
      }
    })();

    render();
  </script>
</body>
</html>
